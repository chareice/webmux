services:
  server:
    image: ${WEBMUX_SERVER_IMAGE:-ghcr.io/chareice/webmux-server:main}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:4317:4317"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      - webmux-data:/app/data
    environment:
      PORT: "4317"
      DATABASE_PATH: "/app/data/webmux.db"
      JWT_SECRET: "${JWT_SECRET}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      WEBMUX_FIREBASE_SERVICE_ACCOUNT_BASE64: "${WEBMUX_FIREBASE_SERVICE_ACCOUNT_BASE64:-}"
      WEBMUX_BASE_URL: "${WEBMUX_BASE_URL}"

volumes:
  webmux-data:
