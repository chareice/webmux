# E2E test environment
# Usage:
#   docker compose -f e2e/docker-compose.yml up -d --build hub node
#   docker compose -f e2e/docker-compose.yml up --build --abort-on-container-exit --exit-code-from runner runner

services:
  hub:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.hub
    ports:
      - "127.0.0.1:4317:4317"
    environment:
      DATABASE_PATH: "/app/data/tc.db"
      WEBMUX_STATIC_DIR: "/app/web"
      WEBMUX_DEV_MODE: "true"
      JWT_SECRET: "e2e-test-secret"
      WEBMUX_BASE_URL: "http://localhost:4317"
      WEBMUX_ZELLIJ_CA_CERT: "/usr/local/share/ca-certificates/zellij-ca.crt"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4317/api/auth/dev || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  node:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.node
    environment:
      WEBMUX_ZELLIJ_PUBLIC_BASE_URL: "https://node:8443"
      WEBMUX_ZELLIJ_LISTEN_IP: "0.0.0.0"
      WEBMUX_ZELLIJ_PORT: "8443"
      WEBMUX_ZELLIJ_CERT: "/etc/webmux/zellij-node.crt"
      WEBMUX_ZELLIJ_KEY: "/etc/webmux/zellij-node.key"
    command:
      - webmux-node
      - start
      - --hub-url
      - ws://hub:4317/ws/machine
      - --id
      - e2e-node
      - --name
      - e2e-machine
    depends_on:
      hub:
        condition: service_healthy

  runner:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.runner
    ipc: host
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: "http://hub:4317"
    depends_on:
      hub:
        condition: service_healthy
      node:
        condition: service_started
    volumes:
      - ./artifacts:/work/e2e/artifacts
