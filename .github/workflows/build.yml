name: Build and Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install --global pnpm@10.23.0
      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @webmux/shared build
      - run: pnpm --filter @webmux/web build
      - run: pnpm --filter @webmux/server build
      - run: pnpm --filter @webmux/agent build

      # Copy web dist into server package for npm publish
      - run: cp -r packages/web/dist packages/server/web

      # Publish packages (skip if version already exists)
      - run: pnpm --filter @webmux/server publish --no-git-checks --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm --filter @webmux/agent publish --no-git-checks --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
