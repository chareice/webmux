name: Build and Publish Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - run: cd rust && cargo build --release --bin webmux-agent

      - name: Get version
        id: version
        run: echo "version=$(cd rust && cargo metadata --no-deps --format-version 1 | python3 -c 'import sys,json; pkgs=json.load(sys.stdin)["packages"]; print([p["version"] for p in pkgs if p["name"]=="webmux-agent"][0])')" >> $GITHUB_OUTPUT

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: webmux-agent-linux-x64
          path: rust/target/release/webmux-agent
