name: Build and Release Node Binary

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-node:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - run: cd rust && cargo build --release --bin webmux-node

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webmux-node-linux-x64
          path: rust/target/release/webmux-node

      - name: Upload binary to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp rust/target/release/webmux-node webmux-node-linux-x64
          gh release upload "${{ github.ref_name }}" \
            webmux-node-linux-x64#webmux-node-linux-x64 \
            --clobber
