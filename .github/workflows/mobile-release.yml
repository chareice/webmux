name: Build Mobile Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}

    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.11.0

      - run: npm install --global pnpm@10.23.0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare Android SDK
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "$sdk_root/platform-tools" >> "$GITHUB_PATH"
          echo "$sdk_root/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          yes | "$sdk_root/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$sdk_root/cmdline-tools/latest/bin/sdkmanager" platform-tools

      - name: Install mobile dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Derive release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            raw_tag="${{ github.event.release.tag_name }}"
            version_name="${raw_tag#v}"

            if ! printf '%s' "$version_name" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Release tag must look like v1.2.3 or 1.2.3, got: $raw_tag" >&2
              exit 1
            fi

            IFS='.' read -r major minor patch <<< "$version_name"
            version_code=$((major * 1000000 + minor * 1000 + patch))
            asset_suffix="$raw_tag"
          else
            version_name="0.0.${{ github.run_number }}"
            version_code="${{ github.run_number }}"
            asset_suffix="manual-${{ github.run_number }}"
          fi

          {
            echo "WEBMUX_MOBILE_VERSION_NAME=$version_name"
            echo "WEBMUX_MOBILE_VERSION_CODE=$version_code"
          } >> "$GITHUB_ENV"

          {
            echo "version_name=$version_name"
            echo "version_code=$version_code"
            echo "asset_suffix=$asset_suffix"
          } >> "$GITHUB_OUTPUT"

      - name: Write Android SDK path
        run: |
          sdk_path="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=$sdk_path" > android/local.properties

      - name: Prepare Firebase config
        run: bash scripts/prepare-google-services.sh

      - name: Prepare release signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          {
            echo "WEBMUX_UPLOAD_STORE_FILE=$GITHUB_WORKSPACE/packages/mobile/android/app/release.keystore"
            echo "WEBMUX_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "WEBMUX_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "WEBMUX_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build Android release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Prepare Android assets
        id: asset
        run: |
          suffix="${{ steps.version.outputs.asset_suffix }}"
          apk_name="webmux-${suffix}.apk"
          apk_path="$PWD/$apk_name"
          aab_name="webmux-${suffix}.aab"
          aab_path="$PWD/$aab_name"

          cp android/app/build/outputs/apk/release/app-release.apk "$apk_path"
          cp android/app/build/outputs/bundle/release/app-release.aab "$aab_path"

          {
            echo "apk_name=$apk_name"
            echo "apk_path=$apk_path"
            echo "aab_name=$aab_name"
            echo "aab_path=$aab_path"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v6
        with:
          name: webmux-android-${{ steps.version.outputs.asset_suffix }}
          path: |
            ${{ steps.asset.outputs.apk_path }}
            ${{ steps.asset.outputs.aab_path }}

      - name: Upload Android assets to GitHub release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.asset.outputs.apk_path }}#${{ steps.asset.outputs.apk_name }}" \
            "${{ steps.asset.outputs.aab_path }}#${{ steps.asset.outputs.aab_name }}" \
            --clobber
