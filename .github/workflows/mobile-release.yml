name: Build Mobile Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
          cache-dependency-path: packages/mobile/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Write Android SDK path
        run: |
          sdk_path="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=$sdk_path" > android/local.properties

      - name: Prepare release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          {
            echo "WEBMUX_UPLOAD_STORE_FILE=$GITHUB_WORKSPACE/packages/mobile/android/app/release.keystore"
            echo "WEBMUX_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "WEBMUX_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "WEBMUX_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Build Android release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare APK asset
        id: asset
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            suffix="${{ github.event.release.tag_name }}"
          else
            suffix="manual-${{ github.run_number }}"
          fi

          asset_name="webmux-${suffix}.apk"
          asset_path="$PWD/$asset_name"
          cp android/app/build/outputs/apk/release/app-release.apk "$asset_path"

          echo "name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "path=$asset_path" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.name }}
          path: ${{ steps.asset.outputs.path }}

      - name: Upload APK to GitHub release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.asset.outputs.path }}#${{ steps.asset.outputs.name }}" --clobber
