name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm
          cache-dependency-path: packages/mobile/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile --ignore-workspace
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
