name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.11.0

      - run: corepack enable
      - run: corepack prepare pnpm@10.23.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -Dw @rolldown/binding-linux-x64-gnu@1.0.0-rc.9
      - run: pnpm --filter @webmux/shared build
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  mobile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.11.0

      - run: corepack enable
      - run: corepack prepare pnpm@10.23.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: cd packages/mobile && pnpm install --frozen-lockfile --ignore-workspace
      - run: cd packages/mobile && pnpm test
      - run: cd packages/mobile && pnpm lint
      - run: cd packages/mobile && pnpm exec tsc --noEmit
