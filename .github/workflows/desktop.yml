name: Desktop Build

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version from tag
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#desktop-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$REF" ]; then
            echo "::error::Expected tag like desktop-vX.Y.Z, got '$REF'"
            exit 1
          fi
          echo "Building desktop version $VERSION (from tag $REF)"
          export VERSION
          node -e "
            const fs = require('fs');
            const p = 'packages/desktop/src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(p, 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Desktop ${{ github.ref_name }}"
          releaseBody: "See the assets to download the desktop app for your platform."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
